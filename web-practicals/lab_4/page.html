<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Task 7 — Валідатор форми</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 480px; margin: 3rem auto; padding: 1rem; line-height: 1.5; }
    h1 { color: #2050a0; }
    form { display: flex; flex-direction: column; gap: 0.8rem; }
    label { display: flex; flex-direction: column; gap: 3px; }
    input { padding: 8px; border: 1px solid #ccd; border-radius: 4px; font-size: 1rem; }
    input.invalid { border-color: #c33; outline-color: #c33; }
    .error { color: #c33; font-size: 0.85rem; min-height: 1.2em; }
    button {
      background: #2050a0; color: white; padding: 10px;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h1>Реєстрація</h1>

  <form id="register" novalidate>
    <label>
      Імʼя
      <input name="name" type="text">
      <span class="error" data-for="name"></span>
    </label>

    <label>
      Email
      <input name="email" type="email">
      <span class="error" data-for="email"></span>
    </label>

    <label>
      Пароль
      <input name="password" type="password">
      <span class="error" data-for="password"></span>
    </label>

    <label>
      Підтвердити пароль
      <input name="confirm" type="password">
      <span class="error" data-for="confirm"></span>
    </label>

    <button type="submit">Зареєструватися</button>
  </form>

  <script src="validator.js"></script>
</body>
</html>
